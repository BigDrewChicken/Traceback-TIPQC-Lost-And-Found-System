<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traceback - TIPQC</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* BASE */
        body {
            display: flex;
            flex-direction: row;
            height: 100vh;
            overflow: hidden;
        }

        aside {
            width: 18rem;
            min-width: 18rem;
            max-width: 18rem;
            flex-shrink: 0;
            position: relative;
            z-index: 40; 
        }

        main {
            flex: 1;
            min-width: 0;
            overflow: auto;
            position: relative;
            z-index: 10;
        }

        /* TRANSITION */
        body, aside, button, h1, h2, div, input, main {
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        /* DARK */
        .dark aside { background-color: #000 !important; border-color: #222 !important; }
        .dark main { background-color: #0a0a0a !important; }
        .dark h1 { color: #FACC15 !important; }
        .dark h2 { color: #EAB308 !important; opacity: 0.9; }

        .dark .nav-btn {
            background-color: #000 !important;
            color: #FACC15 !important;
            border-color: #FACC15 !important;
        }

        .nav-btn:hover {
            background-color: #e5e7eb !important;
            color: #000 !important;
        }

        .dark .nav-btn:hover {
            background-color: #111 !important;
            color: #FACC15 !important;
        }

        /* MODAL */
        .dark #modalContent,
        .dark #itemModalContent {
            background-color: #000 !important;
            border-color: #FACC15 !important;
            color: #FACC15 !important;
        }

        .dark input,
        .dark textarea,
        .dark select {
            background-color: #111 !important;
            border-color: #333 !important;
            color: #FACC15 !important;
        }

        .dark input::placeholder,
        .dark textarea::placeholder {
            color: #71717a !important;
        }

        /* TABLE */
        #table-container {
            overflow-x: auto;
        }

        table {
            width: max-content;
            min-width: 100%;
        }

        .dark table {
            background-color: #000 !important;
            color: #FACC15 !important;
            border-color: #222 !important;
        }

        .dark thead {
            background-color: #FACC15 !important;
            color: #000 !important;
        }

        /* ACTION */
        .btn-action {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            transition: transform 0.1s ease;
        }

        .btn-action:active {
            transform: scale(0.9);
        }

        td {
            white-space: nowrap;
            padding: 12px;
        }
    </style>
</head>

<body class="bg-gray-100">

    <aside class="bg-white flex flex-col p-6 text-gray-900 border-r border-gray-200 shadow-xl">
        <div class="mb-10 flex flex-col items-start">
            <div class="w-32 h-32 mb-4 overflow-hidden">
                <img src="imgs/final_logo.png" class="w-full h-full object-contain object-left" alt="Logo">
            </div>
            <h1 class="text-3xl font-black">Traceback</h1>
            <h2 class="text-sm font-semibold text-gray-500 italic mt-1">TIPQC Lost and Found</h2>
        </div>

        <nav class="flex-grow space-y-4">
            <button onclick="renderTable('Current')" class="nav-btn w-full px-4 py-3 rounded-lg border-2 border-yellow-400 font-bold">
                <i class="fa-solid fa-box mr-2"></i> Current Items
            </button>
            <button onclick="renderTable('Found')" class="nav-btn w-full px-4 py-3 rounded-lg border-2 border-yellow-400 font-bold">
                <i class="fa-solid fa-circle-check mr-2"></i> Found Items
            </button>
            <button onclick="renderTable('Discarded')" class="nav-btn w-full px-4 py-3 rounded-lg border-2 border-yellow-400 font-bold">
                <i class="fa-solid fa-trash mr-2"></i> Discarded Items
            </button>
        </nav>

        <div class="mt-auto pt-6 border-t flex flex-col gap-3">
            <button onclick="toggleDarkMode()" class="flex items-center gap-3 px-4 py-2 hover:bg-gray-100 rounded-lg">
                <i id="modeIcon" class="fa-solid fa-moon"></i>
                <span id="modeText">Dark Mode</span>
            </button>
            <button id="adminBtn" onclick="toggleModal()" class="w-full bg-black text-white font-black py-4 rounded-lg uppercase hover:bg-gray-800 cursor-pointer">
                LOGIN
            </button>
        </div>
    </aside>

    <main id="main-content" class="p-10 bg-slate-50">
        <div class="absolute inset-0 flex flex-col items-center justify-center text-gray-400 space-y-4">
            <i class="fa-solid fa-arrow-left text-4xl animate-bounce"></i>
            <p class="italic text-xl">Select a category</p>
        </div>
    </main>

    <div id="loginModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/60">
        <div id="modalContent" class="bg-white p-8 rounded-2xl shadow-2xl w-96 border-4 border-yellow-400">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-black">LOGIN</h3>
                <button onclick="toggleModal()" class="text-xl hover:opacity-70">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <input id="username" type="text" placeholder="Username" class="w-full border p-3 rounded mb-3">
            <input id="password" type="password" placeholder="Password" class="w-full border p-3 rounded mb-4">
            <button onclick="handleLogin()" class="w-full bg-black text-white font-bold py-3 rounded hover:bg-gray-800">
                ENTER
            </button>
        </div>
    </div>

    <div id="itemModal" class="hidden fixed inset-0 z-[100] bg-black/60 flex items-center justify-center">
        <div id="itemModalContent" class="bg-white p-8 w-[550px] rounded-2xl border-4 border-yellow-400">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-black">Add Record</h2>
                <button onclick="toggleItemModal()" class="text-xl hover:opacity-70">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <input id="in-name" class="w-full border p-2 mb-2" placeholder="Item Name">
            <textarea id="in-desc" class="w-full border p-2 mb-2" placeholder="Description"></textarea>
            <div class="grid grid-cols-2 gap-2 mb-2">
                <input id="in-stud" class="border p-2" placeholder="Student ID">
                <input id="in-date" type="date" class="border p-2">
            </div>
            <div class="mb-2">
                <input type="text" id="locationInput" list="locationOptions" class="w-full border p-2" placeholder="Location (e.g. B1-101)" autocomplete="off">
                <datalist id="locationOptions"></datalist>
            </div>
            <div class="mb-4">
                <input type="text" id="in-cat" class="w-full border p-2" placeholder="Category of item (e.g Electronics, Wallet, etc.)">
            </div>
            <button onclick="saveItem()" class="w-full bg-black text-white py-3 font-bold hover:bg-gray-800 transition-colors">
                Save
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
